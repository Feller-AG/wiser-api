<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>Feller µGateway Swagger UI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.25.2/swagger-ui.css" integrity="sha256-T3ZBclPzfX/lqrjWm+rzAXVw4qthEonFBJaLIHigcjY=" crossorigin="anonymous">
    <style>
      html
      {
        box-sizing: border-box;
        overflow: -moz-scrollbars-vertical;
        overflow-y: scroll;
      }

      *,
      *:before,
      *:after
      {
        box-sizing: inherit;
      }

      body
      {
        margin:0;
        background: #fafafa;
      }

      .swagger-ui .model-title
      {
        font-size: inherit;
      }

      .swagger-ui .model-box {
        padding: 5px;
      }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.25.2/swagger-ui-bundle.js" integrity="sha256-g266j54Jtiyti61imRUOwzjQegs+PNrJ9TN9pZfNlaI=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.25.2/swagger-ui-standalone-preset.js" integrity="sha256-hxC22Q7OcRPdRnUA+hTtM7WEi2i4aVrQdfjVxsmvOwE=" crossorigin="anonymous"></script>
    <script>
    window.onload = function() {
      // Begin Swagger UI call region
      const ui = SwaggerUIBundle({
        url: "./ugateway_openapi_domain_public.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        layout: "BaseLayout",
        defaultModelsExpandDepth: -1,
        defaultModelExpandDepth: -1,
        defaultModelRendering: ["model"],
        displayRequestDuration: true,
        validatorUrl: null,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ]
      });
      // End Swagger UI call region

      window.ui = ui;
    };
  </script>
  </body>
</html>
